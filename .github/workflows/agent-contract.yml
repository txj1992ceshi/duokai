name: Agent Contract

on:
  pull_request:
    paths:
      - 'duokai-api/**'
      - '.github/workflows/agent-contract.yml'
  push:
    branches:
      - main
    paths:
      - 'duokai-api/**'
      - '.github/workflows/agent-contract.yml'
  workflow_dispatch:

jobs:
  contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: duokai-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: duokai-api/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Agent contract tests
        run: npm test
