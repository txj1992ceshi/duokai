name: Agent Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '25 3 * * *'

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: duokai-api
    env:
      API_BASE: ${{ secrets.AGENT_SMOKE_API_BASE }}
      ADMIN_IDENTIFIER: ${{ secrets.AGENT_SMOKE_ADMIN_IDENTIFIER }}
      ADMIN_PASSWORD: ${{ secrets.AGENT_SMOKE_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: duokai-api/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Validate secrets
        run: |
          if [ -z "$API_BASE" ] || [ -z "$ADMIN_IDENTIFIER" ] || [ -z "$ADMIN_PASSWORD" ]; then
            echo "Missing AGENT_SMOKE_* secrets"
            exit 1
          fi

      - name: Run smoke test
        run: npm run smoke:agent
