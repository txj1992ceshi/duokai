name: Deploy Vultr

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vultr-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          port: ${{ secrets.VULTR_PORT || '22' }}
          envs: VULTR_ROOT_DIR,PUBLIC_SCHEME,PUBLIC_HOST,EXTRA_CORS_ORIGINS
          script_stop: true
          command_timeout: 45m
          script: |
            set -euo pipefail
            cd "${VULTR_ROOT_DIR:-/var/www/duokai}"
            BRANCH=main \
            PUBLIC_SCHEME="${PUBLIC_SCHEME:-http}" \
            PUBLIC_HOST="${PUBLIC_HOST}" \
            EXTRA_CORS_ORIGINS="${EXTRA_CORS_ORIGINS:-}" \
            bash deploy/update-from-git.sh
    env:
      VULTR_ROOT_DIR: ${{ secrets.VULTR_ROOT_DIR }}
      PUBLIC_SCHEME: ${{ secrets.VULTR_PUBLIC_SCHEME }}
      PUBLIC_HOST: ${{ secrets.VULTR_PUBLIC_HOST }}
      EXTRA_CORS_ORIGINS: ${{ secrets.VULTR_EXTRA_CORS_ORIGINS }}
