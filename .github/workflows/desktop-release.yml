name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag. Leave blank to use v + apps/duokai2 package version.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            runner: macos-latest
            artifact_name: duokai2-mac-release
            build_command: npm run build:mac
          - platform: win
            runner: windows-latest
            artifact_name: duokai2-win-release
            build_command: npm run build:win
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: apps/duokai2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Resolve desktop version
        id: desktop-version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ -n "${{ github.event.inputs.release_tag }}" ] && [ "${{ github.event.inputs.release_tag }}" != "${EXPECTED_TAG}" ]; then
            echo "release_tag must match package version exactly: ${EXPECTED_TAG}" >&2
            exit 1
          fi
          RELEASE_TAG="${EXPECTED_TAG}"
          if [[ "${PACKAGE_VERSION}" == *-* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npm run install:chromium

      - name: Build desktop package
        run: ${{ matrix.build_command }}

      - name: Collect release assets (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find release -maxdepth 3 -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.yml' -o -name '*.blockmap' \) -print0 | while IFS= read -r -d '' file; do
            cp "$file" "release-assets/$(basename "$file")"
          done
          ls release-assets | grep "${{ steps.desktop-version.outputs.package_version }}"
          test -f "release-assets/latest-mac.yml"
          ls -la release-assets

      - name: Collect release assets (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Get-ChildItem -Path release -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.zip', '.yml', '.blockmap' } |
            ForEach-Object {
              Copy-Item $_.FullName (Join-Path $PWD "release-assets/$($_.Name)") -Force
            }
          if (-not (Get-ChildItem release-assets | Where-Object { $_.Name -like "*${{ steps.desktop-version.outputs.package_version }}*" })) {
            throw "Release assets do not match package version ${{ steps.desktop-version.outputs.package_version }}"
          }
          if (-not (Test-Path "release-assets/latest.yml")) {
            throw "latest.yml not found in release assets"
          }
          Get-ChildItem release-assets

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: apps/duokai2/release-assets/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve release tag
        id: desktop-version
        run: |
          PACKAGE_VERSION=$(node -p "require('./apps/duokai2/package.json').version")
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ -n "${{ github.event.inputs.release_tag }}" ] && [ "${{ github.event.inputs.release_tag }}" != "${EXPECTED_TAG}" ]; then
            echo "release_tag must match package version exactly: ${EXPECTED_TAG}" >&2
            exit 1
          fi
          RELEASE_TAG="${EXPECTED_TAG}"
          if [[ "${PACKAGE_VERSION}" == *-* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Download matrix artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: duokai2-*-release
          path: release-assets
          merge-multiple: true

      - name: Delete existing release assets for tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.desktop-version.outputs.release_tag }}'
            let release
            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              })
              release = response.data
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release found for ${tag}; skipping asset cleanup.`)
                return
              }
              throw error
            }

            if (!Array.isArray(release.assets) || release.assets.length === 0) {
              core.info(`Release ${tag} has no existing assets to delete.`)
              return
            }

            core.info(`Deleting ${release.assets.length} existing assets from release ${tag}.`)
            for (const asset of release.assets) {
              core.info(`Deleting asset: ${asset.name}`)
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
              })
            }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.desktop-version.outputs.release_tag }}
          name: Duokai2 ${{ steps.desktop-version.outputs.release_tag }}
          draft: false
          prerelease: ${{ steps.desktop-version.outputs.prerelease }}
          files: release-assets/*
