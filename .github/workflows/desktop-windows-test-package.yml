name: Build Windows Test Package

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag. Leave blank to use v + apps/duokai2 package version.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\\apps\\duokai2\\.cache\\electron-builder
    defaults:
      run:
        working-directory: apps/duokai2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve desktop version
        id: desktop-version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          else
            RELEASE_TAG="v${PACKAGE_VERSION}"
          fi
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/duokai2/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npm run install:chromium

      - name: Build Windows installer
        run: npm run build:win

      - name: Prepare Windows release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $exe = Get-ChildItem -Path release -Recurse -Filter *.exe | Select-Object -First 1
          if (-not $exe) { throw 'Windows installer (.exe) not found under release/' }
          Copy-Item $exe.FullName (Join-Path $PWD "release-assets/Duokai2 Setup ${{ steps.desktop-version.outputs.package_version }}.exe") -Force

          $zip = Get-ChildItem -Path release -Recurse -Filter *.zip |
            Where-Object { $_.Name -notmatch 'mac' } |
            Select-Object -First 1
          if (-not $zip) { throw 'Windows zip package not found under release/' }
          Copy-Item $zip.FullName (Join-Path $PWD "release-assets/Duokai2-${{ steps.desktop-version.outputs.package_version }}-win.zip") -Force

      - name: Upload Actions artifacts
        uses: actions/upload-artifact@v4
        with:
          name: duokai2-windows-test-package
          path: apps/duokai2/release-assets/*
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.desktop-version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: Duokai2 ${{ steps.desktop-version.outputs.release_tag }}
          generate_release_notes: true
          files: |
            apps/duokai2/release-assets/Duokai2 Setup ${{ steps.desktop-version.outputs.package_version }}.exe
            apps/duokai2/release-assets/Duokai2-${{ steps.desktop-version.outputs.package_version }}-win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
